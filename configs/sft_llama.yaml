# ── SFT training config for LLaMA 3.2 1B on BigRed200 A100 40GB ──────────────
# Used by: src/models/sft_trainer.py
# Run via: scripts/slurm/run_sft.sh

# ── Model ─────────────────────────────────────────────────────────────────────
model_name: "meta-llama/Llama-3.2-1B"
# Fallback for local testing without HF_TOKEN (same tokeniser family):
# model_name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"

# ── QLoRA / BitsAndBytes ──────────────────────────────────────────────────────
load_in_4bit: true
bnb_4bit_quant_type: "nf4"            # NormalFloat4 — best for LLM weights
bnb_4bit_compute_dtype: "bfloat16"   # bfloat16 on A100 (more stable than fp16)
bnb_4bit_use_double_quant: true      # saves ~0.4 bits/param extra

# ── LoRA ──────────────────────────────────────────────────────────────────────
lora_r: 16
lora_alpha: 32                        # effective scale = alpha / r = 2.0
lora_dropout: 0.05
lora_target_modules:                  # attention projections only
  - q_proj
  - k_proj
  - v_proj
  - o_proj
lora_bias: "none"

# ── Training hyperparameters ──────────────────────────────────────────────────
num_train_epochs: 3
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
gradient_accumulation_steps: 4       # effective batch = 8 * 4 = 32
learning_rate: 2.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.05                   # 5% of steps used for warmup
weight_decay: 0.01
max_grad_norm: 1.0
optim: "paged_adamw_32bit"           # paged optimizer — prevents OOM on A100

# ── Sequence ──────────────────────────────────────────────────────────────────
max_seq_length: 512
packing: false                       # set true to pack short sequences; off for simplicity

# ── A100-specific flags ───────────────────────────────────────────────────────
bf16: true                           # always use bf16 on A100 (not fp16)
tf32: true                           # enable TF32 for matmuls — free speedup on A100
gradient_checkpointing: true         # saves ~40% VRAM; required to fit in 40GB
gradient_checkpointing_kwargs:
  use_reentrant: false               # required with PEFT + gradient checkpointing

# ── Logging & saving ──────────────────────────────────────────────────────────
output_dir: "checkpoints/sft"
logging_steps: 10
eval_strategy: "epoch"
save_strategy: "epoch"
save_total_limit: 3                  # keep only last 3 checkpoints; disk fills fast
load_best_model_at_end: true
metric_for_best_model: "eval_loss"

# ── W&B experiment tracking ───────────────────────────────────────────────────
report_to: "wandb"
run_name: "sft-llama-3.2-1b"        # override per run if doing sweeps

# ── DataLoader ────────────────────────────────────────────────────────────────
dataloader_num_workers: 4            # prevents CPU bottleneck on BigRed200
dataloader_pin_memory: true
